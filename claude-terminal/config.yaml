---
name: "Claude Code"
description: "Terminal interface for Anthropic's Claude Code CLI with persistent auth"
version: "1.7.6"
slug: "claude_terminal"
init: false

# Supported architectures
arch:
  - aarch64
  - amd64

# External resources
url: "https://github.com/incognitojam/home-assistant-addons"

# Web interface configuration
ingress: true
ingress_port: 7681
panel_icon: mdi:robot-excited-outline
panel_title: "Claude Code"
panel_admin: true

# Port configuration
ports:
  7681/tcp: 7681
ports_description:
  7681/tcp: "Web terminal (not required for ingress)"

# Add-on configuration options
# Defaults live here (these are the values applied to new and upgrading
# installs); the human-readable names/descriptions live in translations/en.yaml.
options:
  auto_launch_claude: true
  auto_update_claude: true
  permission_mode: auto
schema:
  auto_launch_claude: bool?
  auto_update_claude: bool?
  permission_mode: list(default|acceptEdits|auto|plan)?

# Volume mappings for file access
map:
  - config:rw    # Access to Home Assistant configuration files

# API access for Home Assistant integration
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true
host_dbus: true

# Service startup configuration
startup: services

# Web UI access URL
webui: http://[HOST]:[PORT:7681]/
