name: Build

on:
  push:
    branches: [main]
    paths:
      - "claude-terminal/**"
      - "codex-terminal/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "claude-terminal/**"
      - "codex-terminal/**"
      - ".github/workflows/build.yml"

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: [claude-terminal, codex-terminal]
        arch: [amd64, aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read app version
        id: addon
        run: |
          version="$(awk -F': *' '/^version:/ { gsub(/"/, "", $2); print $2; exit }' "${{ matrix.addon }}/config.yaml")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.addon }}
          file: ./${{ matrix.addon }}/Dockerfile
          platforms: ${{ matrix.arch == 'aarch64' && 'linux/arm64' || 'linux/amd64' }}
          push: false
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.22
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.addon.outputs.version }}
          tags: local/${{ matrix.addon }}:${{ matrix.arch }}
