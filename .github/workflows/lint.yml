name: Lint

on:
  push:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - ".github/workflows/lint.yml"

jobs:
  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - claude-terminal/Dockerfile
          - codex-terminal/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hadolint
        run: |
          docker run --rm \
            --volume "${PWD}:/repo:ro" \
            --workdir /repo \
            ghcr.io/hadolint/hadolint:v2.14.0@sha256:27086352fd5e1907ea2b934eb1023f217c5ae087992eb59fde121dce9c9ff21e \
            hadolint "${{ matrix.dockerfile }}"
