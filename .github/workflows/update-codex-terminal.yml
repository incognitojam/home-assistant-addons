name: Update Codex Terminal

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:
    inputs:
      codex_release:
        description: "Codex release to pin, for example 0.142.5. Leave blank to use the latest upstream release."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Check for Codex updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update pinned Codex release
        id: update
        env:
          CODEX_RELEASE_OVERRIDE: ${{ inputs.codex_release }}
          GITHUB_TOKEN: ${{ github.token }}
        run: .github/scripts/update-codex-terminal.sh

      - name: Create pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/codex-terminal-${{ steps.update.outputs.codex_release }}
          delete-branch: true
          commit-message: "codex-terminal: bump codex to ${{ steps.update.outputs.codex_release }}"
          title: Bump Codex terminal to ${{ steps.update.outputs.codex_release }}
          body: |
            Updates the Codex terminal add-on to the latest pinned Codex standalone release.

            - Codex: `${{ steps.update.outputs.previous_codex_release }}` -> `${{ steps.update.outputs.codex_release }}`
            - Add-on: `${{ steps.update.outputs.previous_addon_version }}` -> `${{ steps.update.outputs.addon_version }}`
